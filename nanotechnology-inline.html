<title>Nanotechnology — IELTS Reading</title>

<style>

/* ─── RESET ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ─── BASE ───────────────────────────────────────────── */
html, body {
  background: #ffffff;
  color: #1a1a1a;
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 17px;
  line-height: 1.9;
}

/* ─── PAGE ───────────────────────────────────────────── */
.page {
  max-width: 1300px;
  margin: 0 auto;
  padding: 0 0 80px;
}

/* ─── HEADER ─────────────────────────────────────────── */
.top-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid #e0e0e0;
  background: #fff;
  position: sticky;
  top: 0;
  z-index: 80;
}
.top-title {
  font-size: 15px;
  font-weight: 600;
  color: #1a1a1a;
  letter-spacing: 0.01em;
}
.top-hint {
  font-size: 12.5px;
  color: #999;
  font-style: italic;
}

/* ─── COLUMN GRID ────────────────────────────────────── */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
}

/* column label row */
.col-labels {
  display: grid;
  grid-template-columns: 1fr 1fr;
  border-bottom: 1px solid #ddd;
  background: #f7f7f7;
}
.col-label {
  padding: 5px 20px;
  font-size: 10.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #999;
  font-family: 'EB Garamond', Georgia, serif;
}
.col-label-en { border-right: 1px solid #ccc; }

/* ─── PARAGRAPH BLOCK ────────────────────────────────── */
.para-block {
  display: contents; /* children participate in parent grid */
}

/* letter row spans full width via two cells */
.para-letter-cell {
  padding: 24px 20px 6px;
  grid-column: span 1;
}
.para-letter-cell-en { border-right: 1px solid #ccc; }
.para-letter-cell-uz { }

.para-letter {
  display: block;
  font-size: 36px;
  font-weight: 700;
  color: #2a5298;
  font-family: 'EB Garamond', Georgia, serif;
  line-height: 1;
  margin-bottom: 4px;
}

/* ─── PARAGRAPH TEXT CELLS ───────────────────────────── */
.para-text-en,
.para-text-uz {
  padding: 4px 20px 22px;
}
.para-text-en {
  border-right: 1px solid #ccc;
}

/* ─── SENTENCE SPANS (inline) ────────────────────────── */
.sent {
  display: inline;
  border-radius: 2px;
  transition: background 0.13s;
  padding: 1px 0;
}
.sent.hl {
  background: #fff176;
}

/* ─── SENTENCE NUMBER ────────────────────────────────── */
.snum {
  font-size: 10.5px;
  color: #888;
  vertical-align: super;
  margin-right: 1px;
  font-style: normal;
  user-select: none;
  cursor: default;
  font-family: 'EB Garamond', Georgia, serif;
}

/* ─── CLICKABLE WORDS ────────────────────────────────── */
.ew {
  border-bottom: 1px dashed #888;
  cursor: pointer;
  transition: color 0.12s;
  color: inherit;
}
.ew:hover { color: #2a5298; }

/* ─── POPUP ──────────────────────────────────────────── */
#popup {
  display: none;
  position: fixed;
  z-index: 9999;
  background: #fff;
  border: 1.5px solid #b8860b;
  border-radius: 7px;
  box-shadow: 0 6px 24px rgba(0,0,0,0.14);
  padding: 15px 17px 13px;
  width: 290px;
  font-family: 'EB Garamond', Georgia, serif;
}
#popup.on { display: block; }

.pp-row1 {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 1px;
}
.pp-word {
  font-size: 18px;
  font-weight: 600;
  color: #1a1a1a;
}
.pp-close {
  background: none;
  border: none;
  font-size: 17px;
  color: #bbb;
  cursor: pointer;
  padding: 0;
  line-height: 1;
}
.pp-close:hover { color: #444; }

.pp-pos {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #b8860b;
  margin-bottom: 5px;
}

/* IPA + speak row */
.pp-pron {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 9px;
}
.pp-ipa {
  font-size: 13px;
  color: #999;
  font-style: italic;
  font-family: 'EB Garamond', Georgia, serif;
  letter-spacing: 0.03em;
}
.pp-speak {
  font-size: 12px;
  padding: 2px 8px;
  border: 1px solid #ddd;
  border-radius: 4px;
  background: #fff;
  color: #555;
  cursor: pointer;
  font-family: 'EB Garamond', Georgia, serif;
  transition: background 0.13s, color 0.13s, border-color 0.13s;
  line-height: 1.6;
}
.pp-speak:hover {
  background: #2a5298;
  color: #fff;
  border-color: #2a5298;
}

.pp-def {
  font-size: 14px;
  color: #1a1a1a;
  margin-bottom: 6px;
  line-height: 1.55;
}
.pp-uz {
  font-size: 13px;
  color: #444;
  font-style: italic;
  margin-bottom: 8px;
}
.pp-ex {
  font-size: 13px;
  color: #666;
  font-style: italic;
  border-left: 2px solid #e8d9a0;
  padding-left: 8px;
  margin-bottom: 12px;
  line-height: 1.5;
}
.pp-loading {
  font-size: 13px;
  color: #aaa;
  font-style: italic;
  min-height: 56px;
  display: flex;
  align-items: center;
  margin-bottom: 12px;
}
.pp-err {
  font-size: 13px;
  color: #c00;
  margin-bottom: 12px;
}

.pp-links {
  display: flex;
  gap: 8px;
  border-top: 1px solid #f0e8d0;
  padding-top: 9px;
}
.pp-link {
  flex: 1;
  text-align: center;
  font-size: 12px;
  font-family: 'EB Garamond', Georgia, serif;
  padding: 5px 0;
  border: 1px solid #ddd;
  border-radius: 4px;
  background: #fdf8ee;
  color: #7a6000;
  cursor: pointer;
  transition: background 0.13s, color 0.13s, border-color 0.13s;
}
.pp-link:hover {
  background: #2a5298;
  color: #fff;
  border-color: #2a5298;
}

/* ─── RESPONSIVE ─────────────────────────────────────── */
@media (max-width: 660px) {
  .grid, .col-labels { grid-template-columns: 1fr; }
  .para-text-en, .col-label-en, .para-letter-cell-en { border-right: none; border-bottom: 1px solid #ccc; }
}

</style>

/* ════════════════════════════════════════════════════
   BUILD DOM
════════════════════════════════════════════════════ */
var grid    = document.getElementById('grid');
var sentIdx = 0; /* global running counter */

PARAS.forEach(function(para) {

  /* ── paragraph letter row ── */
  var letEN = document.createElement('div');
  letEN.className = 'para-letter-cell para-letter-cell-en';
  letEN.innerHTML = '<span class="para-letter">' + para.letter + '</span>';

  var letUZ = document.createElement('div');
  letUZ.className = 'para-letter-cell para-letter-cell-uz';
  letUZ.innerHTML = '<span class="para-letter" style="color:#ccc;">' + para.letter + '</span>';

  grid.appendChild(letEN);
  grid.appendChild(letUZ);

  /* ── text cells (inline sentences) ── */
  var enCell = document.createElement('div');
  enCell.className = 'para-text-en';

  var uzCell = document.createElement('div');
  uzCell.className = 'para-text-uz';

  para.sentences.forEach(function(s) {
    sentIdx++;
    var idx = sentIdx;

    /* EN span */
    var enSpan = document.createElement('span');
    enSpan.className = 'sent';
    enSpan.dataset.idx = idx;
    enSpan.innerHTML = '<sup class="snum">' + idx + '</sup>' + tokenize(s.en) + ' ';

    /* UZ span */
    var uzSpan = document.createElement('span');
    uzSpan.className = 'sent';
    uzSpan.dataset.idx = idx;
    uzSpan.textContent = s.uz + ' ';
    var numUZ = document.createElement('sup');
    numUZ.className = 'snum';
    numUZ.textContent = idx;
    uzSpan.prepend(numUZ);

    /* hover sync */
    function hl(on) {
      document.querySelectorAll('.sent[data-idx="' + idx + '"]')
        .forEach(function(el) { el.classList.toggle('hl', on); });
    }
    enSpan.addEventListener('mouseenter', function() { hl(true); });
    enSpan.addEventListener('mouseleave', function() { hl(false); });
    uzSpan.addEventListener('mouseenter', function() { hl(true); });
    uzSpan.addEventListener('mouseleave', function() { hl(false); });

    enCell.appendChild(enSpan);
    uzCell.appendChild(uzSpan);
  });

  grid.appendChild(enCell);
  grid.appendChild(uzCell);
});

/* ════════════════════════════════════════════════════
   TOKENISE — wrap each word in .ew
════════════════════════════════════════════════════ */
function tokenize(text) {
  return text.split(/(\s+)/).map(function(tok) {
    var w = tok.replace(/[^a-zA-Z'-]/g, '');
    if (w.length > 1 && /[a-zA-Z]/.test(w)) {
      var disp = esc(tok);
      var word = esc(w);
      return '<span class="ew" data-w="' + word + '">' + disp + '</span>';
    }
    return esc(tok);
  }).join('');
}
function esc(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

var popup   = document.getElementById('popup');
var ppWord  = document.getElementById('ppWord');
var ppPos   = document.getElementById('ppPos');
var ppBody  = document.getElementById('ppBody');
var ppClose = document.getElementById('ppClose');
var ppCamb  = document.getElementById('ppCamb');
var ppOxf   = document.getElementById('ppOxf');
var curWord = '';
var cache   = {};

/* open popup */
function openPopup(word, cx, cy) {
  curWord = word;
  ppWord.textContent = word;
  ppPos.textContent  = '';
  ppBody.innerHTML   = '<div class="pp-loading">Yuklanmoqda…</div>';

  /* position */
  popup.style.visibility = 'hidden';
  popup.style.display    = 'block';
  var pw = popup.offsetWidth  || 290;
  var ph = popup.offsetHeight || 230;
  popup.style.display    = '';
  popup.style.visibility = '';

  popup.style.left = Math.min(cx + 14, window.innerWidth  - pw - 10) + 'px';
  popup.style.top  = Math.min(cy + 14, window.innerHeight - ph - 10) + 'px';
  popup.classList.add('on');

  if (cache[word.toLowerCase()]) {
    render(cache[word.toLowerCase()]);
  } else {
    fetchWord(word);
  }
}
function closePopup() { popup.classList.remove('on'); }

ppClose.addEventListener('click', closePopup);
document.addEventListener('click', function(e) {
  if (!popup.contains(e.target) && !e.target.classList.contains('ew')) closePopup();
});

/* word click (delegated) */
document.addEventListener('click', function(e) {
  var el = e.target.closest('.ew');
  if (!el) return;
  e.stopPropagation();
  openPopup(el.dataset.w || el.textContent.trim(), e.clientX, e.clientY);
});

/* dictionary links */
ppCamb.addEventListener('click', function() {
  if (curWord) window.open('https://dictionary.cambridge.org/dictionary/english/' + encodeURIComponent(curWord.toLowerCase()), '_blank');
});
ppOxf.addEventListener('click', function() {
  if (curWord) window.open('https://www.oxfordlearnersdictionaries.com/definition/english/' + encodeURIComponent(curWord.toLowerCase()), '_blank');
});

/* ════════════════════════════════════════════════════
   AI LOOKUP
════════════════════════════════════════════════════ */
function fetchWord(word) {
  var prompt =
    'You are a concise bilingual dictionary.\n' +
    'For the English word "' + word + '", reply ONLY with a raw JSON object — no markdown fences, no commentary.\n' +
    'Schema: { "pos":"noun|verb|adjective|adverb|etc", "ipa":"/IPA transcription/", "def":"One English definition.", "uz":["variant1","variant2","variant3"], "example":"One short example sentence." }';

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 300,
      messages: [{ role: 'user', content: prompt }]
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var raw = (data.content || []).map(function(b){ return b.text || ''; }).join('').trim();
    var clean = raw.replace(/```json|```/g, '').trim();
    var parsed = JSON.parse(clean);
    cache[word.toLowerCase()] = parsed;
    render(parsed);
  })
  .catch(function() {
    ppBody.innerHTML = '<div class="pp-err">So\'z topilmadi yoki xato yuz berdi.</div>';
  });
}

function render(d) {
  ppPos.textContent = (d.pos || '').toUpperCase();

  /* IPA + speak */
  var pronRow = document.getElementById('ppPron');
  var ipaEl   = document.getElementById('ppIpa');
  if (d.ipa) {
    ipaEl.textContent = d.ipa;
    pronRow.style.display = 'flex';
  } else {
    pronRow.style.display = 'none';
  }

  var uz = Array.isArray(d.uz) ? d.uz.join(' · ') : (d.uz || '');
  ppBody.innerHTML =
    '<div class="pp-def">'  + esc(d.def     || '') + '</div>' +
    '<div class="pp-uz">🇺🇿 ' + esc(uz)           + '</div>' +
    '<div class="pp-ex">'   + esc(d.example || '') + '</div>';
}

/* ─── SPEECH ──────────────────────────────────────── */
var ppSpeak = document.getElementById('ppSpeak');
ppSpeak.addEventListener('click', function() {
  if (!curWord || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  var utt = new SpeechSynthesisUtterance(curWord);
  /* prefer an English voice */
  var voices = window.speechSynthesis.getVoices();
  var enVoice = voices.find(function(v) { return /en[-_](US|GB|AU)/i.test(v.lang); })
             || voices.find(function(v) { return v.lang.startsWith('en'); });
  if (enVoice) utt.voice = enVoice;
  utt.lang = 'en-US';
  utt.rate = 0.9;
  window.speechSynthesis.speak(utt);
});

/* voices load asynchronously in some browsers */
if (window.speechSynthesis && window.speechSynthesis.onvoiceschanged !== undefined) {
  window.speechSynthesis.onvoiceschanged = function() { /* voices now available */ };
}
</script>
</body>
</html>
