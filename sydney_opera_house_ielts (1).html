var passage = document.getElementById('passage');
var globalIdx = 0; // global sentence index across all paragraphs

PARAS.forEach(function(para) {
  // Paragraph letter header row
  var letterRow = document.createElement('div');
  letterRow.className = 'para-letter-row';

  var letterCellEn = document.createElement('div');
  letterCellEn.className = 'para-letter-cell';
  var letterSpan = document.createElement('span');
  letterSpan.className = 'para-letter';
  letterSpan.textContent = para.letter;
  letterCellEn.appendChild(letterSpan);

  var letterDivider = document.createElement('div');
  letterDivider.className = 'para-letter-divider';

  var letterCellUz = document.createElement('div');
  letterCellUz.className = 'para-letter-cell';

  letterRow.appendChild(letterCellEn);
  letterRow.appendChild(letterDivider);
  letterRow.appendChild(letterCellUz);
  passage.appendChild(letterRow);

  // Paragraph text rows ‚ÄĒ group all sentences in one text row
  var textRow = document.createElement('div');
  textRow.className = 'para-text-row';

  var enCell = document.createElement('div');
  enCell.className = 'cell cell-en';

  var dividerCell = document.createElement('div');
  dividerCell.className = 'cell-divider';

  var uzCell = document.createElement('div');
  uzCell.className = 'cell cell-uz';

  para.sentences.forEach(function(s, i) {
    var idx = globalIdx++;

    // EN sentence span
    var enSpan = document.createElement('span');
    enSpan.className = 'sent';
    enSpan.dataset.idx = idx;

    // sentence number superscript
    var numSpan = document.createElement('sup');
    numSpan.className = 'snum';
    numSpan.textContent = (idx + 1) + '. ';
    enSpan.appendChild(numSpan);

    // parse <w> tags
    var enHTML = s.en.replace(/<w>(.*?)<\/w>/g, function(_, word) {
      return '<span class="w" data-word="' + word.toLowerCase().replace(/[^a-z\-]/g,'') + '">' + word + '</span>';
    });
    var tempDiv = document.createElement('div');
    tempDiv.innerHTML = enHTML;
    while (tempDiv.firstChild) {
      enSpan.appendChild(tempDiv.firstChild);
    }
    // space after sentence
    enSpan.appendChild(document.createTextNode(' '));
    enCell.appendChild(enSpan);

    // UZ sentence span
    var uzSpan = document.createElement('span');
    uzSpan.className = 'sent';
    uzSpan.dataset.idx = idx;

    var uzNum = document.createElement('sup');
    uzNum.className = 'snum';
    uzNum.textContent = (idx + 1) + '. ';
    uzSpan.appendChild(uzNum);
    uzSpan.appendChild(document.createTextNode(s.uz + ' '));
    uzCell.appendChild(uzSpan);
  });

  textRow.appendChild(enCell);
  textRow.appendChild(dividerCell);
  textRow.appendChild(uzCell);
  passage.appendChild(textRow);
});

// ======================================================
// HOVER HIGHLIGHT ‚ÄĒ sync both columns by data-idx
// ======================================================
document.addEventListener('mouseover', function(e) {
  var sent = e.target.closest('.sent');
  if (!sent) return;
  var idx = sent.dataset.idx;
  document.querySelectorAll('.sent[data-idx="' + idx + '"]').forEach(function(el) {
    el.classList.add('highlight');
  });
});
document.addEventListener('mouseout', function(e) {
  var sent = e.target.closest('.sent');
  if (!sent) return;
  var idx = sent.dataset.idx;
  document.querySelectorAll('.sent[data-idx="' + idx + '"]').forEach(function(el) {
    el.classList.remove('highlight');
  });
});

if (speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = loadVoices;
}

btnSpeak.addEventListener('click', function() {
  if (!currentWord) return;
  var u = new SpeechSynthesisUtterance(currentWord);
  var en = voices.find(function(v) { return v.lang.startsWith('en'); });
  if (en) u.voice = en;
  u.lang = 'en-GB';
  speechSynthesis.speak(u);
});

function showPopup(word, x, y) {
  currentWord = word;
  popupWord.textContent = word;
  btnCambridge.href = 'https://dictionary.cambridge.org/dictionary/english/' + encodeURIComponent(word);
  btnOxford.href = 'https://www.oxfordlearnersdictionaries.com/definition/english/' + encodeURIComponent(word);

  popup.style.display = 'block';
  overlay.style.display = 'block';

  // position
  var pw = 290, ph = 260;
  var left = x + 14, top = y + 14;
  if (left + pw > window.innerWidth - 10) left = x - pw - 10;
  if (top + ph > window.innerHeight - 10) top = y - ph - 10;
  popup.style.left = Math.max(8, left) + 'px';
  popup.style.top = Math.max(8, top) + 'px';

  // cached?
  if (cache[word]) {
    showData(cache[word]);
    return;
  }

  popupLoading.style.display = 'block';
  popupContent.style.display = 'none';

  fetchWordData(word);
}

function showData(data) {
  popupLoading.style.display = 'none';
  popupContent.style.display = 'block';
  popupIpa.textContent = data.ipa || '';
  popupPos.textContent = data.pos || '';
  popupMeaning.textContent = data.meaning || '';
  popupUzbek.innerHTML = 'ūüáļūüáŅ ' + (data.uzbek || '');
  popupExample.textContent = data.example || '';
}

function fetchWordData(word) {
  var data = DICT[word] || DICT[word.replace(/s$/, '')] || DICT[word.replace(/ed$/, '')] || DICT[word.replace(/ing$/, '')] || null;
  if (data) {
    cache[word] = data;
    if (currentWord === word) {
      showData(data);
    }
  } else {
    if (currentWord === word) {
      popupLoading.style.display = 'none';
      popupContent.style.display = 'block';
      popupIpa.textContent = '';
      popupPos.textContent = '';
      popupMeaning.textContent = 'Definition not available offline.';
      popupUzbek.textContent = '';
      popupExample.textContent = '';
    }
  }
}

function hidePopup() {
  popup.style.display = 'none';
  overlay.style.display = 'none';
}

document.addEventListener('click', function(e) {
  if (e.target.classList.contains('w')) {
    e.stopPropagation();
    var word = e.target.dataset.word;
    showPopup(word, e.clientX, e.clientY);
  }
});

document.getElementById('popup-close').addEventListener('click', hidePopup);
overlay.addEventListener('click', hidePopup);
</script>
</body>
</html>
